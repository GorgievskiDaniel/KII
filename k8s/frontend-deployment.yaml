apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kii-proekt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/gorgievskidaniel/kii-proekt-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_URL
              value: http://backend:8080
